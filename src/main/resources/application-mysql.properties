# MySQL环境配置
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/management_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=${DB_CONN_TIMEOUT:5000}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# 使用MySQL时关闭H2控制台
spring.h2.console.enabled=false
spring.sql.init.mode=${DB_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:schema.sql
