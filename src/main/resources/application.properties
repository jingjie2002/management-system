# 基础配置
server.port=8080

# 默认使用本地开发配置（选用了H2），如需MySQL请使用 --spring.profiles.active=mysql
spring.profiles.active=dev
# spring.profiles.active=mysql

# 允许Spring bean定义覆盖（避免AI模块冲突）
spring.main.allow-bean-definition-overriding=true

# 禁用所有Spring AI自动配置（需要API key，而项目不需要）
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vectorstore.chroma.ChromaVectorStoreAutoConfiguration,\
  com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.elasticsearch.ElasticsearchVectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.milvus.MilvusVectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.postgresql.PostgresVectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.pgvector.PgvectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.qdrant.QdrantVectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.redis.RedisVectorStoreAutoConfiguration,\
  org.springframework.ai.autoconfigure.vectorstore.weaviate.WeaviateVectorStoreAutoConfiguration,\
  org.springframework.ai.model.bedrock.autoconfigure.BedrockAwsAutoConfiguration,\
  org.springframework.ai.model.googlevertexai.autoconfigure.VertexAiAutoConfiguration,\
  org.springframework.ai.model.mistralai.autoconfigure.MistralAiAutoConfiguration,\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicAutoConfiguration,\
  org.springframework.ai.model.googleai.autoconfigure.GoogleAiAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,\
  org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkAutoConfiguration,\
  org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkChatAutoConfiguration,\
  org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openaisdk.autoconfigure.OpenAiSdkImageAutoConfiguration

# 数据库初始化脚本（H2/MySQL通用）
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# H2 控制台（仅dev生效）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.ch.managementsystem.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 禁用MyBatis-Plus的DDL功能，使用schema.sql初始化
mybatis-plus.global-config.db-config.ddl-auto=none

# JWT
jwt.secret=management_system_demo_secret_key_2026_change_in_production
jwt.expiration=86400000

# 日志
logging.level.com.ch.managementsystem=INFO

# 文件上传
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# OpenAPI 文档
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
